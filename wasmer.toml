[package]
name = "abbashafiz/buildpro-crm"
version = "0.1.0"
description = "BuildPro CRM — construction business PWA"
entrypoint = "start"

[dependencies]
"wasmer/static-web-server" = "^1"

[fs]
"/public" = "public"
"/settings" = "settings"

[[command]]
name = "start"
module = "wasmer/static-web-server:webserver"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["-w", "/settings/config.toml"]
